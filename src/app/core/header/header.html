<header class="site-header">
  <div class="header-inner">
    <a class="brand" routerLink="/" (click)="closeMenu()" aria-label="La Vie en Rose home">
      <span class="brand-mark">LR</span>
      <span>
        <strong>La Vie en Rose</strong>
        <small>Nail studio</small>
      </span>
    </a>

    <button
      class="menu-toggle"
      type="button"
      aria-label="Toggle navigation"
      [attr.aria-expanded]="menuOpen()"
      (click)="toggleMenu()"
    >
      <span class="material-symbols-rounded">{{ menuOpen() ? 'close' : 'menu' }}</span>
    </button>

    <nav class="navigation" [class.navigation--open]="menuOpen()" aria-label="Main navigation">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">
        Home
      </a>
      <a routerLink="/services" routerLinkActive="active" (click)="closeMenu()">Services</a>
      <a routerLink="/gallery" routerLinkActive="active" (click)="closeMenu()">Gallery</a>
      <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About</a>
      <a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</a>
      <a class="book-link" routerLink="/contact" fragment="booking" (click)="closeMenu()">
        Book now
        <span class="material-symbols-rounded">arrow_outward</span>
      </a>
    </nav>
  </div>
</header>
