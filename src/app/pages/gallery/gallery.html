<section class="page-hero gallery-hero">
  <img
    class="page-hero-background"
    src="assets/images/services/pink-3d-nail-art.png"
    alt=""
    width="632"
    height="796"
    fetchpriority="high"
  >
  <div class="container fade-up">
    <span class="eyebrow">{{ i18n.t('gallery.hero.eyebrow') }}</span>
    <h1 class="display-title">{{ i18n.t('gallery.hero.title') }}</h1>
    <p>{{ i18n.t('gallery.hero.copy') }}</p>
  </div>
</section>
<section class="section gallery-section">
  <div class="container">
    <div class="gallery-toolbar">
      <div>
        <span class="eyebrow">{{ i18n.t('gallery.toolbar.eyebrow') }}</span>
        <h2 class="section-title">{{ i18n.t('gallery.toolbar.title') }}</h2>
      </div>
    </div>

    <div class="gallery-grid">
      @for (item of galleryItems; track item.src) {
        <button class="gallery-item" type="button" (click)="openImage(item)">
          <img [src]="item.src" [alt]="i18n.t(item.labelKey)" loading="lazy">
        </button>
      }
    </div>
  </div>
</section>

@if (selectedImage(); as image) {
  <div
    class="gallery-modal"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="i18n.t(image.labelKey)"
    (click)="closeImage()"
  >
    <div class="modal-content" (click)="$event.stopPropagation()">
      <button
        class="modal-close"
        type="button"
        [attr.aria-label]="i18n.t('common.close')"
        (click)="closeImage()"
      >
        <span class="material-symbols-rounded">close</span>
      </button>
      <img [src]="image.src" [alt]="i18n.t(image.labelKey)">
    </div>
  </div>
}
